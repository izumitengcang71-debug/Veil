<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=402, initial-scale=1.0">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Veil - 会話</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--accent:#9933ff;--accent-dark:#6600cc;--dark:#0d0d0d;--card-bg:#1a1a1a;--muted:#888;}
*{box-sizing:border-box;}
body{background:#0a0a0a;color:#eee;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;align-items:center;}
/* スマホ幅で中央固定 */
.chat-root{display:flex;flex-direction:column;width:100%;max-width:402px;height:100vh;overflow:hidden;position:relative;background:var(--dark);}

/* ナビバー */
.navbar{background:rgba(10,10,10,.95);border-bottom:1px solid #2a2a2a;display:flex;align-items:center;padding:0 12px;height:52px;flex-shrink:0;width:100%;}
.nav-back{background:none;border:none;color:#aaa;font-size:1.2rem;cursor:pointer;padding:6px;border-radius:6px;}
.nav-back:hover{background:#222;color:#eee;}
.nav-chara-name{flex:1;text-align:center;font-size:.9rem;font-weight:700;color:#eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;cursor:pointer;}
.nav-menu-btn{background:none;border:none;color:#aaa;font-size:1.2rem;cursor:pointer;padding:6px;border-radius:6px;}
.nav-menu-btn:hover{background:#222;color:#eee;}

/* チャットラッパー */
.chat-wrapper{display:flex;flex:1;overflow:hidden;width:100%;}

/* サイドバー */
.sidebar{width:240px;flex-shrink:0;background:#111;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;padding:20px 14px;overflow-y:auto;}
.chara-avatar{width:80px;height:80px;background:linear-gradient(135deg,#2a003a,#1a1a1a);border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 12px;overflow:hidden;}
.chara-name{text-align:center;font-size:1rem;font-weight:700;color:#eee;}
.chara-desc{font-size:.78rem;color:#888;text-align:center;margin-top:8px;line-height:1.5;}
.tag{display:inline-block;font-size:.68rem;color:var(--accent);background:#2a003a;border:1px solid #6600cc;border-radius:12px;padding:2px 8px;margin:2px;}
.tag-area{text-align:center;margin-top:10px;}
.sidebar-divider{border-top:1px solid #2a2a2a;margin:14px 0;}
.back-link{display:block;text-align:center;font-size:.8rem;color:#666;text-decoration:none;padding:6px;border-radius:8px;}
.back-link:hover{color:var(--accent);background:#1a1a1a;}
.sidebar-btn{width:100%;margin-top:6px;background:#1a1a1a;border:1px solid #333;color:#888;border-radius:8px;font-size:.78rem;padding:8px 10px;cursor:pointer;text-align:left;}
.sidebar-btn:hover{background:#2a2a2a;color:#eee;}
.sidebar-btn.danger{border-color:#550022;color:#ff5577;}
.sidebar-btn.danger:hover{background:#2a0010;}

/* APIキー */
.api-area{margin-top:auto;padding-top:16px;}
.api-label{font-size:.72rem;color:#666;margin-bottom:4px;}
.api-input{width:100%;background:#0d0d0d;border:1px solid #333;color:#eee;border-radius:6px;font-size:.75rem;padding:6px 8px;outline:none;}
.api-input:focus{border-color:var(--accent);}
.api-save-btn{width:100%;margin-top:5px;background:#2a2a2a;border:1px solid #444;color:#aaa;border-radius:6px;font-size:.75rem;padding:5px;cursor:pointer;}
.api-save-btn:hover{background:#333;color:#eee;}
.api-status{font-size:.7rem;text-align:center;margin-top:4px;height:14px;}
.api-status.ok{color:#4caf50;}
.api-status.err{color:#f44336;}

/* チャットエリア */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.chat-main::before{content:'';position:absolute;inset:0;background:url('icon.png') no-repeat center center;background-size:150px 150px;opacity:.07;pointer-events:none;z-index:0;}
.chat-main>*{position:relative;z-index:1;}
.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}

/* 吹き出し */
.msg{display:flex;gap:10px;max-width:78%;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.ai{align-self:flex-start;}
.msg.ai .bubble{background:var(--card-bg);border:1px solid #2a2a2a;color:#eee;border-radius:4px 16px 16px 16px;}
.msg-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2a003a,#1a1a1a);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;overflow:hidden;cursor:pointer;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;object-position:top;}
.msg-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.msg-avatar-name{font-size:.6rem;color:#888;max-width:44px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.user .bubble{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-radius:16px 4px 16px 16px;}
.msg.narrator{align-self:center;max-width:92%;width:100%;}
.msg.narrator .bubble{background:transparent;border:1px dashed #333;color:#999;font-style:italic;text-align:center;border-radius:10px;width:100%;}
.bubble{padding:10px 14px;font-size:.9rem;line-height:1.65;word-break:break-word;}
.bubble .action{color:#888;font-style:italic;}

/* 削除ボタン（ホバー時表示） */
.msg-del-btn{display:none;position:absolute;top:-8px;right:-8px;background:#ff3b30;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:.65rem;align-items:center;justify-content:center;cursor:pointer;z-index:10;}
.msg{position:relative;}
.msg:hover .msg-del-btn{display:flex;}
.msg.user .msg-del-btn{right:auto;left:-8px;}
.msg-edit-btn{display:none;position:absolute;top:-8px;right:18px;background:#1a1a1a;border:1px solid #444;color:#aaa;border-radius:50%;width:22px;height:22px;font-size:.62rem;align-items:center;justify-content:center;cursor:pointer;z-index:10;}
.msg-edit-btn:hover{background:#2a2a2a;color:#fff;}
.msg:hover .msg-edit-btn{display:flex;}
.msg.user .msg-edit-btn{right:auto;left:18px;}
.msg-regen-btn{display:none;position:absolute;bottom:-8px;right:-8px;background:#1a1a1a;border:1px solid #444;color:#aaa;border-radius:50%;width:24px;height:24px;font-size:.85rem;align-items:center;justify-content:center;cursor:pointer;z-index:10;}
.msg-regen-btn:hover{background:#2a2a2a;color:#fff;border-color:var(--accent);}
/* バリアント切り替えナビ */
.msg-variant-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.08);}
.msg-variant-btn{background:none;border:none;color:#999;font-size:.85rem;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1;}
.msg-variant-btn:hover:not(:disabled){background:rgba(255,255,255,.08);color:#fff;}
.msg-variant-btn:disabled{opacity:.3;cursor:default;}
.msg-variant-label{font-size:.68rem;color:#777;min-width:28px;text-align:center;}
/* インライン編集 */
.msg-edit-area{width:100%;background:#0d0d0d;border:1px solid var(--accent);border-radius:8px;color:#eee;font-size:.9rem;line-height:1.6;padding:8px 10px;box-sizing:border-box;resize:vertical;min-height:60px;font-family:inherit;}
.msg-edit-actions{display:flex;gap:8px;margin-top:6px;}
.msg-edit-save,.msg-edit-cancel{flex:1;padding:6px;border-radius:8px;border:none;font-size:.78rem;cursor:pointer;}
.msg-edit-save{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;}
.msg-edit-cancel{background:#222;color:#999;}
.msg.ai:hover .msg-regen-btn{display:flex;}

/* コンテキストメニュー */
.ctx-menu{position:fixed;background:#1e1e1e;border:1px solid #333;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:1000;min-width:160px;overflow:hidden;display:none;}
.ctx-menu.show{display:block;}
.ctx-item{padding:11px 16px;font-size:.85rem;color:#eee;cursor:pointer;display:flex;align-items:center;gap:10px;}
.ctx-item:hover{background:#2a2a2a;}
.ctx-item.danger{color:#ff5577;}
.ctx-item.danger:hover{background:#2a0010;}
.ctx-divider{border-top:1px solid #2a2a2a;}

/* タイピング */
.typing-dots span{display:inline-block;width:6px;height:6px;background:#888;border-radius:50%;margin:0 2px;animation:blink 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}

/* ウェルカム */
.welcome{text-align:center;color:#444;font-size:.85rem;margin:auto;padding:40px 20px;}
.welcome-icon{font-size:2.5rem;margin-bottom:12px;}
.welcome-img-wrap{width:120px;height:120px;border-radius:50%;overflow:hidden;margin:0 auto 12px;border:2px solid var(--accent);}
.welcome-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:top;}

/* 入力エリア */
.input-area{padding:10px 12px;border-top:1px solid #2a2a2a;background:#0f0f0f;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.ast-btn{width:36px;height:36px;flex-shrink:0;background:#1a1a1a;border:1px solid #444;border-radius:10px;color:#aaa;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ast-btn:hover{background:#2a2a2a;color:#fff;}
.msg-input{flex:1;background:#1a1a1a;border:1px solid #333;color:#eee;border-radius:12px;font-size:.9rem;padding:10px 14px;resize:none;outline:none;min-height:44px;max-height:120px;line-height:1.5;font-family:inherit;}
.msg-input:focus{border-color:var(--accent);}
.msg-input::placeholder{color:#555;}
.send-btn{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border:none;border-radius:12px;color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,opacity .15s;flex-shrink:0;}
.send-btn:hover:not(:disabled){transform:scale(1.05);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* チャットメニュー */
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;}
.menu-overlay.show{display:block;}
.menu-panel{position:fixed;top:0;right:-280px;width:260px;height:100vh;background:#111;border-left:1px solid #2a2a2a;z-index:201;transition:right .25s ease;display:flex;flex-direction:column;padding:20px 14px;overflow-y:auto;}
.menu-panel.show{right:0;}
.menu-title{font-size:1rem;font-weight:700;margin-bottom:14px;color:#eee;}
.menu-btn{display:flex;align-items:center;gap:10px;padding:12px 12px;border-radius:10px;cursor:pointer;font-size:.88rem;color:#ccc;border:none;background:none;width:100%;text-align:left;margin-bottom:3px;}
.menu-btn:hover{background:#1e1e1e;color:#fff;}
.menu-btn.danger{color:#ff5577;}
.menu-btn.danger:hover{background:#2a0010;}
.menu-icon{font-size:1.1rem;width:22px;text-align:center;}
.menu-sep{border-top:1px solid #2a2a2a;margin:8px 0;}

/* 保存した会話リスト */
.saved-chat-empty{padding:8px 12px;font-size:.75rem;color:#444;}
.saved-chat-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;margin-bottom:3px;}
.saved-chat-item:hover{background:#1e1e1e;}
.saved-chat-info{flex:1;min-width:0;}
.saved-chat-date{font-size:.78rem;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.saved-chat-count{font-size:.68rem;color:#666;}
.saved-chat-del{background:none;border:none;color:#666;font-size:.9rem;cursor:pointer;flex-shrink:0;padding:4px;}
.saved-chat-del:hover{color:#ff5577;}

/* 保存確認モーダル */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:398;}
.confirm-overlay.show{display:block;}
.confirm-modal{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:402px;background:#141414;border-radius:20px 20px 0 0;border-top:1px solid #2a2a2a;z-index:399;display:none;padding:22px 18px 28px;}
.confirm-modal.show{display:block;}
.confirm-modal-title{font-size:.95rem;font-weight:700;color:#eee;margin-bottom:6px;}
.confirm-modal-desc{font-size:.8rem;color:#888;margin-bottom:18px;line-height:1.5;}
.confirm-btn{width:100%;padding:12px;border-radius:12px;border:none;font-size:.86rem;font-weight:600;cursor:pointer;margin-bottom:8px;}
.confirm-btn-save{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;}
.confirm-btn-discard{background:#241012;color:#ff5577;}
.confirm-btn-cancel{background:#1c1c1c;color:#999;}

/* トークプロフィール モーダル */
.tp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;}
.tp-overlay.show{display:block;}
.tp-modal{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:402px;background:#111;border-radius:20px 20px 0 0;border-top:1px solid #2a2a2a;z-index:301;padding:0 0 40px;max-height:80vh;overflow-y:auto;display:none;}
.tp-modal.show{display:block;}
.tp-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid #2a2a2a;}
.tp-modal-title{font-size:.95rem;font-weight:700;color:#eee;}
.tp-modal-close{background:none;border:none;color:#666;font-size:1.2rem;cursor:pointer;}
.tp-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #1a1a1a;}
.tp-item:hover{background:#1a1a1a;}
.tp-item.active-item{background:#2a003a;}
.tp-avatar{width:44px;height:44px;border-radius:50%;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;overflow:hidden;border:2px solid #333;}
.tp-avatar img{width:100%;height:100%;object-fit:cover;}
.tp-info{flex:1;min-width:0;}
.tp-name{font-size:.88rem;font-weight:700;color:#eee;}
.tp-desc{font-size:.72rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.tp-check{color:var(--accent);font-size:1.1rem;}
.tp-add-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;color:var(--accent);font-size:.88rem;}
.tp-add-icon{width:44px;height:44px;border-radius:50%;background:#2a003a;display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:2px solid #6600cc;flex-shrink:0;}

/* 画像モーダル */
.img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;align-items:center;justify-content:center;cursor:pointer;}
.img-modal.show{display:flex;}
.img-modal img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain;}
.img-modal-close{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:1.5rem;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* トースト */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#eee;font-size:.82rem;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .3s;z-index:500;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}

.sidebar{display:none;}.chat-main{width:100%;flex:1;}
</style>
<script>
  // JSONBin.io（みんなのキャラを保存するクラウドストレージ）
  const JSONBIN_ID = '6a5cdb6cda38895dfe728471';

</script>
</head>
<body>
<div class="chat-root">

<!-- ナビバー -->
<nav class="navbar">
  <button class="nav-back" onclick="goBackFromChat()">←</button>
  <div class="nav-chara-name" id="nav-name" onclick="goToCharDetail()"></div>
  <button class="nav-menu-btn" onclick="openMenu()">☰</button>
</nav>

<div class="chat-wrapper">
  <!-- サイドバー -->
  <div class="sidebar">
    <div class="chara-avatar" id="side-avatar">
      <span id="side-emoji">🎭</span>
    </div>
    <div class="chara-name" id="side-name">-</div>
    <div class="chara-desc" id="side-desc"></div>
    <div class="tag-area" id="side-tags"></div>
    <div class="sidebar-divider"></div>
    <a href="index.html" class="back-link">← キャラ一覧に戻る</a>
    <div style="margin-top:12px;font-size:.72rem;color:#555;font-weight:600;margin-bottom:4px;">メニュー</div>
    <button class="sidebar-btn" onclick="exportText()">💾 会話をテキスト保存</button>
    <button class="sidebar-btn" onclick="exportImage()">📸 会話を画像で保存</button>
    <div class="api-area">
      <div class="api-label">🔑 Google APIキー</div>
      <input type="password" class="api-input" id="api-key-input" placeholder="APIキーを貼り付け" autocomplete="off" data-lpignore="true" data-1p-ignore="true" name="charachat-google-key">
      <button class="api-save-btn" onclick="saveApiKey()">保存する</button>
      <div class="api-status" id="api-status"></div>
      <div style="font-size:.65rem;color:#555;margin-top:5px;text-align:center;">
        <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#666;">APIキーを取得 →</a>
      </div>
    </div>
  </div>

  <!-- チャットメイン -->
  <div class="chat-main">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome-msg">
        <div class="welcome-icon" id="welcome-icon">🎭</div>
        <div id="welcome-img-outer" style="display:none;">
          <div class="welcome-img-wrap"><img id="welcome-img" src="" alt=""></div>
        </div>
        <div id="welcome-text">キャラを選んで会話を始めよう</div>
        <div id="welcome-apikey-hint" style="margin-top:8px;font-size:.75rem;color:#333;">サイドバーにGoogle APIキーを入力してください</div>
      </div>
    </div>
    <div class="input-area">
      <button class="ast-btn" onclick="insertAsterisk()" title="＊を挿入">＊</button>
      <button class="ast-btn" onclick="insertNarrator()" title="ナレーターを追加">@</button>
      <textarea class="msg-input" id="msg-input" placeholder="メッセージを入力..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="送信">➤</button>
    </div>
  </div>
</div>
</div><!-- /chat-root -->

<!-- チャットメニュー -->
<div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
<div class="menu-panel" id="menu-panel">
  <div class="menu-title">メニュー</div>
  <button class="menu-btn" onclick="exportText();closeMenu()"><span class="menu-icon">💾</span>テキストで保存</button>
  <button class="menu-btn" onclick="exportImage();closeMenu()"><span class="menu-icon">📸</span>画像で保存</button>
  <button class="menu-btn" onclick="shareChat();closeMenu()"><span class="menu-icon">🔗</span>会話内容をコピー</button>
  <div class="menu-sep"></div>
  <button class="menu-btn" onclick="openTpModal();closeMenu()">
    <span class="menu-icon">👤</span>トークプロフィール
    <span id="tp-active-label" style="margin-left:auto;font-size:.75rem;color:#888;"></span>
  </button>
  <div class="menu-sep"></div>
  <button class="menu-btn danger" onclick="clearHistory()"><span class="menu-icon">🗑</span>会話履歴を削除</button>
  <div class="menu-sep"></div>
  <div style="font-size:.72rem;color:#666;font-weight:600;padding:2px 12px 6px;">保存した会話</div>
  <div id="saved-chats-list"></div>
  <div class="menu-sep"></div>
  <a href="index.html" class="menu-btn" style="text-decoration:none;color:#ccc;"><span class="menu-icon">🏠</span>ホームへ戻る</a>
  <div class="menu-sep" style="margin-top:auto;"></div>
  <div style="padding:4px 0 8px;">
    <div class="api-label" style="color:#666;font-size:.72rem;margin-bottom:4px;">🔑 Google APIキー</div>
    <input type="password" class="api-input" id="api-key-input-menu" placeholder="APIキーを貼り付け" autocomplete="off" data-lpignore="true" style="width:100%;background:#0d0d0d;border:1px solid #333;color:#eee;border-radius:6px;font-size:.75rem;padding:6px 8px;outline:none;box-sizing:border-box;">
    <button onclick="saveApiKeyMenu()" style="width:100%;margin-top:5px;background:#2a2a2a;border:1px solid #444;color:#aaa;border-radius:6px;font-size:.75rem;padding:5px;cursor:pointer;">保存する</button>

// ユーザー作成キャラをマージ（自分の端末のキャラ＋クラウド同期されたみんなのキャラ）
function getCloudChars() {
  try { return JSON.parse(localStorage.getItem('cloud_chars') || '{}'); }
  catch(e) { return {}; }
}

function getAllChars() {
  try {
    const userChars = JSON.parse(localStorage.getItem('user_chars') || '[]');
    const extra = {};
    userChars.forEach(c => { extra[c.id] = c; });
    return { ...CHARACTERS, ...getCloudChars(), ...extra };
  } catch(e) { return CHARACTERS; }
}

async function syncCloudChars() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }
    });
    const data = await res.json();
    const chars = (data.record && data.record.characters) || {};
    localStorage.setItem('cloud_chars', JSON.stringify(chars));
    return chars;
  } catch(e) {
    console.warn('クラウド同期に失敗しました', e);
    return getCloudChars();
  }
}

// トーク数取得
function getTalkCount(id) {
  return parseInt(localStorage.getItem('talk_count_' + id) || '0', 10);
}

<script>

const params = new URLSearchParams(location.search);

let currentChar = null;
let chatHistory = [];
// 配布用デフォルトAPIキー（ユーザーが独自に保存した場合はそちらが優先されます）
const DEFAULT_API_KEY = 'AQ.Ab8RN6I0jGMxyoX9by5PUm6aysAHROZMdlsXaH0teRXnt0YUcg';
let apiKey = localStorage.getItem('google_api_key') || localStorage.getItem('groq_api_key') || DEFAULT_API_KEY;
// Gemini混雑時のフォールバック用（Cerebras）
const DEFAULT_CEREBRAS_KEY = 'csk-ftxn6pkcnxmpn2yckd48e8mvpfdp4cxxn2cekn5mdc5k3xhj';
let cerebrasApiKey = localStorage.getItem('cerebras_api_key') || DEFAULT_CEREBRAS_KEY;
let isLoading = false;
let ctxTargetEl = null;
let ctxTargetText = '';

async function init() {
  if (apiKey) {
    const sideInput = document.getElementById('api-key-input');
    if (sideInput) sideInput.value = apiKey;
    const sideStatus = document.getElementById('api-status');
    if (sideStatus) { sideStatus.textContent = '✓ 設定済み'; sideStatus.className = 'api-status ok'; }
    const menuInput = document.getElementById('api-key-input-menu');
    if (menuInput) menuInput.value = apiKey;
    const menuStatus = document.getElementById('api-status-menu');
    if (menuStatus) { menuStatus.textContent = '✓ 設定済み'; menuStatus.className = 'api-status ok'; }
    const hint = document.getElementById('welcome-apikey-hint');
    if (hint) hint.style.display = 'none';
  }
  if (cerebrasApiKey) {
    const cInput = document.getElementById('cerebras-key-input-menu');
    if (cInput) cInput.value = cerebrasApiKey;
    const cStatus = document.getElementById('cerebras-status-menu');
    if (cStatus) { cStatus.textContent = '✓ 設定済み'; cStatus.className = 'api-status ok'; }
  }
  updateTpLabel();

  if (!charId) return;
  let all = getAllChars();
  currentChar = all[charId];

  if (!currentChar) {
    // ローカルにキャッシュがなければクラウド全体を同期
    await syncCloudChars();
    all = getAllChars();
    currentChar = all[charId];
  }
  if (!currentChar) {
    // それでも見つからなければ、もう一度クラウドから取り直す
    try {
      const chars = await syncCloudChars();
      currentChar = chars[charId];
    } catch(e) { console.warn('キャラの取得に失敗しました', e); }
  }
  if (!currentChar) return;

  initCharDisplay();

  // 会話履歴ロード
  try {
    const saved = localStorage.getItem('chat_history_' + charId);
    if (saved) chatHistory = JSON.parse(saved);
  } catch(e) { chatHistory = []; }

  if (chatHistory.length > 0) {
    document.getElementById('welcome-msg').remove();
    chatHistory.forEach((msg, i) => appendMessage(...msgRenderArgs(msg), i));
  } else if (currentChar.intro) {
    document.getElementById('welcome-msg').remove();
    appendMessage('ai', currentChar.intro, 0);
    chatHistory.push({ role: 'assistant', content: currentChar.intro });
    saveHistory();
  }
}

    wi.style.display = 'none';
    document.getElementById('welcome-img-outer').style.display = 'block';
    document.getElementById('welcome-img').src = c.img;
  } else {
    wi.textContent = c.emoji || '🎭';
  }
  document.getElementById('welcome-text').textContent = c.name + ' との会話を始めよう';
}

function saveHistory() {
  try { localStorage.setItem('chat_history_' + charId, JSON.stringify(chatHistory.slice(-60))); } catch(e) {}
}

// ================================
// メッセージ追加
// ================================
function msgRenderArgs(msg) {
  if (msg.role === 'user' && msg.content.startsWith('【自動継続】')) {
    return ['skip', msg.content];
  }
  if (msg.role === 'user' && msg.content.startsWith('（ナレーション）')) {
    return ['narrator', msg.content.replace('（ナレーション）', '')];
  }
  return [msg.role === 'user' ? 'user' : 'ai', msg.content];
}

function appendMessage(role, text, historyIdx) {
  if (role === 'skip') return null;
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const idx = historyIdx ?? chatHistory.length;
  div.dataset.idx = idx;

  const isAI = role === 'ai';
  const isEditable = role === 'ai' || role === 'user' || role === 'narrator';

  let avatarHtml = '';
  if (isAI) {
    const avInner = currentChar?.img
      ? `<div class="msg-avatar" onclick="openImgModal('${currentChar.img}')"><img src="${currentChar.img}" alt="${currentChar.name}"></div>`
      : `<div class="msg-avatar">${currentChar?.emoji || '🎭'}</div>`;
    avatarHtml = `<div class="msg-avatar-wrap">${avInner}<span class="msg-avatar-name">${currentChar?.name || ''}</span></div>`;
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const bubbleText = document.createElement('div');
  bubbleText.className = 'bubble-text';
  bubbleText.innerHTML = formatText(text);
  bubble.appendChild(bubbleText);

  const delBtn = document.createElement('button');
  delBtn.className = 'msg-del-btn';
  delBtn.textContent = '✕';
  delBtn.title = '削除';
  delBtn.onclick = (e) => { e.stopPropagation(); deleteMsg(div); };

  if (isAI) {
    if (avatarHtml) div.innerHTML = avatarHtml;
    div.appendChild(bubble);
  } else {
    div.appendChild(bubble);
  }
  div.appendChild(delBtn);

  if (isEditable) {
    const editBtn = document.createElement('button');
    editBtn.className = 'msg-edit-btn';
    editBtn.innerHTML = '✎';
    editBtn.title = '編集する';
    editBtn.onclick = (e) => { e.stopPropagation(); startEditMessage(div); };
    div.appendChild(editBtn);
  }

  if (isAI) {
    const regenBtn = document.createElement('button');
    regenBtn.className = 'msg-regen-btn';
    regenBtn.innerHTML = '↺';
    regenBtn.title = 'この返信をやり直す';
    regenBtn.onclick = (e) => { e.stopPropagation(); regenerateMessage(div); };
    div.appendChild(regenBtn);

    const hist = chatHistory[idx];
    if (hist?.variants && hist.variants.length > 1) {
      renderVariantNav(div, idx);
    }
  }

  // 長押し
  let pressTimer = null;
  const getCurrentText = () => div.querySelector('.bubble-text')?.textContent ?? text;
  div.addEventListener('pointerdown', e => {
    pressTimer = setTimeout(() => showCtxMenu(e, div, getCurrentText()), 500);
  });
  div.addEventListener('pointerup', () => clearTimeout(pressTimer));
  div.addEventListener('pointerleave', () => clearTimeout(pressTimer));
  div.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e, div, getCurrentText()); });

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

// バリアント（やり直し履歴）のナビゲーション行を描画
function renderVariantNav(div, idx) {
  const bubble = div.querySelector('.bubble');
  if (!bubble) return;
  let nav = bubble.querySelector('.msg-variant-nav');
  if (nav) nav.remove();

  const hist = chatHistory[idx];
  if (!hist?.variants || hist.variants.length <= 1) return;

  nav = document.createElement('div');
  nav.className = 'msg-variant-nav';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'msg-variant-btn';
  prevBtn.innerHTML = '←';
  prevBtn.disabled = hist.variantIndex <= 0;
  prevBtn.onclick = (e) => { e.stopPropagation(); switchVariant(div, idx, -1); };

  const label = document.createElement('span');
  label.className = 'msg-variant-label';
  label.textContent = (hist.variantIndex + 1) + ' / ' + hist.variants.length;

  const nextBtn = document.createElement('button');
  nextBtn.className = 'msg-variant-btn';
  nextBtn.innerHTML = '→';
  nextBtn.disabled = hist.variantIndex >= hist.variants.length - 1;
  nextBtn.onclick = (e) => { e.stopPropagation(); switchVariant(div, idx, 1); };

  nav.appendChild(prevBtn);
  nav.appendChild(label);
  nav.appendChild(nextBtn);
  bubble.appendChild(nav);
}

function switchVariant(div, idx, dir) {
  const hist = chatHistory[idx];
  if (!hist?.variants) return;
  const newIndex = hist.variantIndex + dir;
  if (newIndex < 0 || newIndex >= hist.variants.length) return;
  hist.variantIndex = newIndex;
  hist.content = hist.variants[newIndex];
  saveHistory();

  const bubbleText = div.querySelector('.bubble-text');
  if (bubbleText) bubbleText.innerHTML = formatText(hist.content);
  renderVariantNav(div, idx);
}

// ================================
// メッセージ編集
// ================================
function startEditMessage(div) {
  if (div.querySelector('.msg-edit-area')) return; // 編集中
  const idx = parseInt(div.dataset.idx);
  const hist = chatHistory[idx];
  if (!hist) return;

  let rawText = hist.content;
  if (rawText.startsWith('（ナレーション）')) rawText = rawText.replace('（ナレーション）', '');

  const bubble = div.querySelector('.bubble');
  const bubbleText = div.querySelector('.bubble-text');
  if (!bubble || !bubbleText) return;

  bubbleText.style.display = 'none';
  const oldNav = bubble.querySelector('.msg-variant-nav');
  if (oldNav) oldNav.style.display = 'none';

  const textarea = document.createElement('textarea');
  textarea.className = 'msg-edit-area';
  textarea.value = rawText;

  const actions = document.createElement('div');
  actions.className = 'msg-edit-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'msg-edit-save';
  saveBtn.textContent = '保存';
  saveBtn.onclick = (e) => { e.stopPropagation(); saveEditMessage(div, idx, textarea.value); };
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'msg-edit-cancel';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.onclick = (e) => { e.stopPropagation(); cancelEditMessage(div); };
  actions.appendChild(saveBtn);
  actions.appendChild(cancelBtn);

  bubble.appendChild(textarea);
  bubble.appendChild(actions);
  textarea.focus();
  autoResize(textarea);
}

function saveEditMessage(div, idx, newRaw) {
  const trimmed = newRaw.trim();
  if (!trimmed) { cancelEditMessage(div); return; }
  const hist = chatHistory[idx];
  if (!hist) return;

  const wasNarration = hist.content.startsWith('（ナレーション）');
  const newContent = wasNarration ? `（ナレーション）${trimmed}` : trimmed;
  hist.content = newContent;
  if (hist.variants && typeof hist.variantIndex === 'number') {
    hist.variants[hist.variantIndex] = newContent;
  }
  saveHistory();
  cleanupEditUI(div);

  const bubbleText = div.querySelector('.bubble-text');
  if (bubbleText) bubbleText.innerHTML = formatText(trimmed);
}

function cancelEditMessage(div) {
  cleanupEditUI(div);
}

function cleanupEditUI(div) {
  const bubble = div.querySelector('.bubble');
  if (!bubble) return;
  const textarea = bubble.querySelector('.msg-edit-area');
  const actions = bubble.querySelector('.msg-edit-actions');
  if (textarea) textarea.remove();
  if (actions) actions.remove();
  const bubbleText = div.querySelector('.bubble-text');
  if (bubbleText) bubbleText.style.display = '';
  const nav = bubble.querySelector('.msg-variant-nav');
  if (nav) nav.style.display = '';
}

function formatText(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>')
    .replace(/\*([^*\n]+)\*/g, '<span class="action">*$1*</span>');
}

// ================================
// メッセージ削除
// ================================
function deleteMsg(el) {
  const idx = parseInt(el.dataset.idx);
  if (!isNaN(idx) && idx >= 0 && idx < chatHistory.length) {
    chatHistory.splice(idx, 1);
    saveHistory();
  }
  rebuildMessages();
  showToast('削除しました');
}

function rebuildMessages() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  if (chatHistory.length === 0) {
    if (currentChar?.intro) {
      appendMessage('ai', currentChar.intro, 0);
      chatHistory.push({ role: 'assistant', content: currentChar.intro });
      saveHistory();
    }
    return;
  }
  chatHistory.forEach((msg, i) => appendMessage(...msgRenderArgs(msg), i));
}

// ================================
// 返信のやり直し
// ================================
async function regenerateMessage(div) {
  if (isLoading) return;
  const idx = parseInt(div.dataset.idx);
  if (isNaN(idx) || idx < 0 || idx >= chatHistory.length) return;
  const hist = chatHistory[idx];
  if (hist.role !== 'assistant') return;

  // このメッセージより後の会話は破棄（このメッセージ自体は残す）
  chatHistory = chatHistory.slice(0, idx + 1);

  // 既存の内容をバリアントとして初期化
  if (!hist.variants) {
    hist.variants = [hist.content];
    hist.variantIndex = 0;
  }
  saveHistory();

  // このメッセージより後のDOM要素を削除
  let node = div.nextElementSibling;
  while (node) {
    const next = node.nextElementSibling;
    node.remove();
    node = next;
  }

  const typingId = addTyping();
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  try {
    // このメッセージ自体を含めずに文脈を渡す（新しい返信を生成するため）
    const contextHistory = chatHistory.slice(0, idx);
    const reply = await getAIReply(contextHistory);
    removeTyping(typingId);

    hist.variants.push(reply);
    hist.variantIndex = hist.variants.length - 1;
    hist.content = reply;
    saveHistory();

    const bubbleText = div.querySelector('.bubble-text');
    if (bubbleText) bubbleText.innerHTML = formatText(reply);
    renderVariantNav(div, idx);
  } catch(err) {
    removeTyping(typingId);
    const isAuthErr = err.message.includes('401') || err.message.toLowerCase().includes('invalid api key') || err.message.includes('invalid_api_key');
    const errMsg = isAuthErr
      ? '⚠️ APIキーが正しく認識されませんでした。\nサイドバーのAPIキーを一度消して、Google AI Studioから取得したキーを貼り付け直してから「保存する」を押してください。'
      : err.isBusy
        ? '⚠️ Gemini APIが現在混み合っています。\nしばらく（1分ほど）待ってから、もう一度お試しください。'
        : '⚠️ エラーが発生しました。\n' + err.message;
    showToast(errMsg.replace(/\n/g, ' '));
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

// ================================
// 送信
// ================================
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!apiKey) {
    openMenu(); setTimeout(() => { const el = document.getElementById('api-key-input-menu'); if (el) el.focus(); }, 300); showToast('☰メニューからAPIキーを入力してください');
    return;
  }
  if (!currentChar) {
    alert('URLにキャラIDが指定されていません');
    return;
  }
  const wm = document.getElementById('welcome-msg');
  if (wm) wm.remove();

  const isEmpty = text === '';
  const isNarration = !isEmpty && text.startsWith('@:');
  const displayText = isNarration ? text.slice(2).trim() : text;
  const historyText = isEmpty
    ? '【自動継続】（ユーザーは特に何も言わず、黙って様子をうかがっている。返答を待たず、状況や話題を自分から動かして物語を自然に展開してください）'
    : (isNarration ? `（ナレーション）${displayText}` : text);

  const userIdx = chatHistory.length;
  if (!isEmpty) {
    appendMessage(isNarration ? 'narrator' : 'user', displayText, userIdx);
  }
  chatHistory.push({ role: 'user', content: historyText });
  saveHistory();
  input.value = '';
  autoResize(input);

  const typingId = addTyping();
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const reply = await getAIReply();
    removeTyping(typingId);
    const aiIdx = chatHistory.length;
    appendMessage('ai', reply, aiIdx);
    chatHistory.push({ role: 'assistant', content: reply });
    saveHistory();
    // トーク数++
    if (charId) {
      const cur = getTalkCount(charId);
      localStorage.setItem('talk_count_' + charId, cur + 1);
    }
  } catch(err) {
    removeTyping(typingId);
    const isAuthErr = err.message.includes('401') || err.message.toLowerCase().includes('invalid api key') || err.message.includes('invalid_api_key');
    const errMsg = isAuthErr
      ? '⚠️ APIキーが正しく認識されませんでした。\nサイドバーのAPIキーを一度消して、Google AI Studioから取得したキーを貼り付け直してから「保存する」を押してください。\n（ブラウザの自動入力で別のパスワードが入ってしまっている場合があります）'
      : err.isBusy
        ? '⚠️ Gemini APIが現在混み合っています。\nしばらく（1分ほど）待ってから、もう一度メッセージを送信してみてください。'
        : '⚠️ エラーが発生しました。\n' + err.message;
    appendMessage('ai', errMsg, chatHistory.length);
    if (isAuthErr) {
      document.getElementById('api-status').textContent = '✗ APIキーが無効です';
      document.getElementById('api-status').className = 'api-status err';
    }
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ================================
// ================================
// Google Gemini API
// ================================
function buildSystemPrompt() {
  let systemPrompt = currentChar.system || '';
  try {
    const tp = JSON.parse(localStorage.getItem('active_talk_profile') || 'null');
    const prof = JSON.parse(localStorage.getItem('my_profile') || 'null');
    const userName = (tp?.name) || (prof?.name) || 'あなた';
    systemPrompt = systemPrompt.replace(/{{user}}/g, userName);
    if (tp?.desc) systemPrompt += '\n\n【ユーザープロフィール】\n名前: ' + tp.name + '\n' + tp.desc;
  } catch(e) {}

  systemPrompt += '\n\n【返答の長さについて】キャラクターの口調や性格は保ちつつ、返答は3〜5文程度、情景描写や心情も交えてやや長めに書いてください。一言だけの短い返答は避けてください。また、セリフだけで終わらせず、*こういう形式*で表情・仕草・視線などの行動描写を返答の中に1〜2箇所は必ず織り交ぜてください。';
  systemPrompt += '\n\n【ナレーションについて】ユーザーのメッセージが「（ナレーション）」から始まる場合、それはユーザーからの発言ではなく、地の文としての状況・情景描写です。その内容を踏まえてキャラクターとして自然に反応してください。';
  return systemPrompt;
}

// ================================
// 複数プロバイダー対応（Gemini→混雑時はCerebrasへ自動切替）
// ================================
async function getAIReply(historyOverride) {
  try {
    return await callGemini(historyOverride);
  } catch (err) {
    if (err.isBusy && cerebrasApiKey) {
      try {
        return await callCerebras(historyOverride);
      } catch (err2) {
        throw err; // Cerebrasも失敗した場合は元のGeminiのエラーを表示
      }
    }
    throw err;
  }
}

async function callCerebras(historyOverride) {
  const systemPrompt = buildSystemPrompt();
  const messages = [
    { role: 'system', content: systemPrompt },
    ...(historyOverride || chatHistory).slice(-20).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }))
  ];

  const res = await fetch('https://api.cerebras.ai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cerebrasApiKey },
    body: JSON.stringify({ model: 'llama-3.3-70b', messages, max_tokens: 1024, temperature: 0.9 })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || res.statusText);
  return data.choices?.[0]?.message?.content || '（返答がありませんでした）';
}

async function callGemini(historyOverride) {
  const systemPrompt = buildSystemPrompt();

  const contents = (historyOverride || chatHistory).slice(-20).map(m => ({
    role: m.role === 'user' ? 'user' : 'model',
    parts: [{ text: m.content }]
  }));

  const body = JSON.stringify({
    contents,
    systemInstruction: { parts: [{ text: systemPrompt }] },
    generationConfig: { maxOutputTokens: 1024, temperature: 0.9 }
  });

  async function requestOnce() {
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
      body
    });
    const data = await res.json();
    if (!res.ok) {
      const err = new Error(data.error?.message || res.statusText);
      err.status = res.status;
      throw err;
    }
    const parts = data.candidates?.[0]?.content?.parts;
    return parts?.map(p => p.text || '').join('') || '';
  }

  try {
    const text = await requestOnce();
    return text || '（返答がありませんでした）';
  } catch (err) {
    const isBusy = err.status === 503 || err.status === 429 || /high demand|overloaded|unavailable/i.test(err.message || '');
    if (isBusy) {
      await new Promise(r => setTimeout(r, 1500));
      try {
        const text = await requestOnce();
        return text || '（返答がありませんでした）';
      } catch (err2) {
        err2.isBusy = /high demand|overloaded|unavailable/i.test(err2.message || '') || err2.status === 503 || err2.status === 429;
        throw err2;
      }
    }
    throw err;
  }
}

  div.className = 'msg ai'; div.id = id;

    : `<div class="msg-avatar">${currentChar?.emoji||'🎭'}</div>`;
  let avHtml = `<div class="msg-avatar-wrap">${avInner}<span class="msg-avatar-name">${currentChar?.name || ''}</span></div>`;
  div.innerHTML = avHtml + '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }

// ================================
function insertAsterisk() {
  const inp = document.getElementById('msg-input');
  const s = inp.selectionStart, e = inp.selectionEnd;
  inp.value = inp.value.slice(0,s) + '*' + inp.value.slice(e);
  inp.selectionStart = inp.selectionEnd = s + 1;
  inp.focus(); autoResize(inp);
}

function insertNarrator() {
  const inp = document.getElementById('msg-input');
  if (!inp.value.trimStart().startsWith('@:')) {
    inp.value = '@:' + inp.value;
  }
  inp.selectionStart = inp.selectionEnd = inp.value.length;
  inp.focus(); autoResize(inp);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('input', () => autoResize(msgInput));
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ================================
// エクスポート
// ================================
function clearHistory() {
  if (chatHistory.length === 0) { showToast('会話がまだありません'); return; }
  document.getElementById('confirm-overlay').classList.add('show');
  document.getElementById('confirm-modal').classList.add('show');
}

function closeSaveConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
  document.getElementById('confirm-modal').classList.remove('show');
}

function getSavedChats() {
  try { return JSON.parse(localStorage.getItem('saved_chats_' + charId) || '[]'); }
  catch(e) { return []; }
}

function setSavedChats(list) {
  try { localStorage.setItem('saved_chats_' + charId, JSON.stringify(list)); } catch(e) {}
}

function saveAndClearHistory() {
  const list = getSavedChats();
  list.unshift({
    id: 'saved_' + Date.now(),
    savedAt: new Date().toISOString(),
    count: chatHistory.length,
    messages: chatHistory
  });
  setSavedChats(list);
  chatHistory = [];
  if (charId) localStorage.removeItem('chat_history_' + charId);
  rebuildMessages();
  renderSavedChatsList();
  closeSaveConfirm();
  showToast('会話を保存して削除しました');
}

function discardHistory() {
  chatHistory = [];
  if (charId) localStorage.removeItem('chat_history_' + charId);
  rebuildMessages();
  closeSaveConfirm();
  showToast('会話履歴を削除しました');
}

function formatSavedDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderSavedChatsList() {
  const el = document.getElementById('saved-chats-list');
  if (!el) return;
  const list = getSavedChats();
  if (list.length === 0) {
    el.innerHTML = '<div class="saved-chat-empty">まだ保存した会話はありません</div>';
    return;
  }
  el.innerHTML = list.map(item => `
    <div class="saved-chat-item" onclick="resumeSavedChat('${item.id}')">
      <div class="saved-chat-info">
        <div class="saved-chat-date">${formatSavedDate(item.savedAt)}</div>
        <div class="saved-chat-count">💬 ${item.count}件のメッセージ</div>
      </div>
      <button class="saved-chat-del" onclick="event.stopPropagation();deleteSavedChat('${item.id}')" title="この保存を削除">✕</button>
    </div>
  `).join('');
}

function resumeSavedChat(id) {
  const list = getSavedChats();
  const item = list.find(x => x.id === id);
  if (!item) return;
  if (chatHistory.length > 0) {
    if (!confirm('現在の会話は保存されていません。保存済みの会話を再開すると、今の会話は消えてしまいますが続けますか？')) return;
  }
  chatHistory = item.messages;
  saveHistory();
  setSavedChats(list.filter(x => x.id !== id));
  rebuildMessages();
  renderSavedChatsList();
  closeMenu();
  showToast('会話を再開しました');
}

function deleteSavedChat(id) {
  if (!confirm('この保存済み会話を完全に削除しますか？')) return;
  setSavedChats(getSavedChats().filter(x => x.id !== id));
  renderSavedChatsList();
}

function exportText() {
  if (chatHistory.length === 0) { showToast('会話がまだありません'); return; }
  const name = currentChar?.name || 'キャラ';
  const lines = chatHistory.map(m => `[${m.role==='user'?'あなた':name}]\n${m.content}`).join('\n\n');
  const header = `【Veil - ${name} との会話】\n日時: ${new Date().toLocaleString('ja-JP')}\n${'─'.repeat(30)}\n\n`;
  const blob = new Blob([header + lines], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `veil_${name}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click(); URL.revokeObjectURL(url);
  showToast('テキストを保存しました');
}

async function exportImage() {
  if (chatHistory.length === 0) { showToast('会話がまだありません'); return; }
  showToast('画像を生成中...');
  try {
    const canvas = await html2canvas(document.getElementById('messages'), {
      backgroundColor: '#0d0d0d', scale: 2, useCORS: true, allowTaint: true, logging: false,
    });
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url; a.download = `veil_${currentChar?.name||'chat'}_${new Date().toISOString().slice(0,10)}.png`;
    a.click();
    showToast('画像を保存しました！');
  } catch(e) { showToast('画像の生成に失敗しました'); }
}

function shareChat() {
  if (chatHistory.length === 0) { showToast('会話がまだありません'); return; }
  const name = currentChar?.name || 'キャラ';
  const text = chatHistory.map(m => `[${m.role==='user'?'あなた':name}] ${m.content}`).join('\n\n');
  navigator.clipboard?.writeText(text).then(() => showToast('コピーしました')).catch(() => showToast('コピー失敗'));
}

// ================================
// トークプロフィール モーダル
// ================================
function openTpModal() {
  const profiles = loadTpProfiles();
  const active = getActiveTp();
  const list = document.getElementById('tp-list');
  list.innerHTML = profiles.map((p, i) => {
    const isActive = active && active.id === p.id;
    const avEl = p.avatar
      ? `<div class="tp-avatar"><img src="${p.avatar}" alt="${p.name}"></div>`
      : `<div class="tp-avatar">👤</div>`;
    return `<div class="tp-item${isActive?' active-item':''}" onclick="selectTp(${i})">
      ${avEl}
      <div class="tp-info"><div class="tp-name">${p.name}</div><div class="tp-desc">${p.desc||''}</div></div>
      ${isActive ? '<span class="tp-check">✓</span>' : ''}
    </div>`;
  }).join('');
  if (profiles.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#555;font-size:.82rem;">トークプロフィールなし</div>';
  }
  document.getElementById('tp-overlay').classList.add('show');
  document.getElementById('tp-modal').classList.add('show');
}
function closeTpModal() {
  document.getElementById('tp-overlay').classList.remove('show');
  document.getElementById('tp-modal').classList.remove('show');
}
function loadTpProfiles() {
  try { return JSON.parse(localStorage.getItem('talk_profiles') || '[]'); } catch(e) { return []; }
}
function getActiveTp() {
  try { return JSON.parse(localStorage.getItem('active_talk_profile') || 'null'); } catch(e) { return null; }
}
function selectTp(i) {
  const profiles = loadTpProfiles();
  if (i < 0 || i >= profiles.length) { localStorage.removeItem('active_talk_profile'); }
  else { localStorage.setItem('active_talk_profile', JSON.stringify(profiles[i])); }
  updateTpLabel();
  closeTpModal();
  showToast('プロフィールを設定しました');
}
function updateTpLabel() {
  const p = getActiveTp();
  const el = document.getElementById('tp-active-label');
  if (el) el.textContent = p ? p.name : '未設定';
}
function goNewTalkProfile() {
  closeTpModal();
  location.href = 'index.html?action=new_talk_profile';
}

// ================================
// 画像モーダル
// ================================
function openImgModal(src) {
  document.getElementById('img-modal-src').src = src;
  document.getElementById('img-modal').classList.add('show');
}
function closeImgModal() { document.getElementById('img-modal').classList.remove('show'); }

// ================================
// トースト
// ================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// 初期化
init();
</script>
